<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SpendWise</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
  <div class="auth-container">
    <h1>Welcome Back</h1>
    <form class="form" id="login-form" style="margin-top:0;">
      <div class="form-control">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
      </div>
      <div class="form-control">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn" id="login-btn">Login</button>
    </form>
    <a href="register.html" class="auth-link">Don't have an account? Register →</a>
  </div>

  <script>
    const storedUser = localStorage.getItem("user");
    if (storedUser) window.location.href = "expense_tracker.html";

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!username || !password) { alert('Please enter both username and password.'); return; }

      try {
        const res = await fetch("http://localhost:8081/ExpTrack/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });
        if (!res.ok) { const err = await res.json(); alert(err.message); return; }
        const data = await res.json();
        localStorage.setItem("user", data.username);
        window.location.href = "expense_tracker.html";
      } catch (err) {
        alert("Request failed: " + err.message);
      }
    });
  </script>
</body>
</html>
